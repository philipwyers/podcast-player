// ── Fetch ─────────────────────────────────────────────────────────────
function jsonp(url,ms){
  return new Promise(function(res,rej){
    var cb='_cb'+Date.now()+'_'+Math.floor(Math.random()*9999),sc=document.createElement('script');
    var t=setTimeout(function(){cleanup();rej(new Error('timeout'));},ms||12000);
    function cleanup(){clearTimeout(t);delete window[cb];sc.parentNode&&sc.parentNode.removeChild(sc);}
    window[cb]=function(d){cleanup();(d&&d.status==='ok'&&d.items&&d.items.length)?res({type:'json',data:d}):rej(new Error('bad'));};
    sc.onerror=function(){cleanup();rej(new Error('err'));};
    sc.src=url+'&callback='+cb;document.head.appendChild(sc);
  });
}
function tf(url,ms){
  var fp=fetch(url).then(function(r){if(!r.ok)throw new Error(r.status);return r;});
  var tp=new Promise(function(_,r){setTimeout(function(){r(new Error('timeout'));},ms);});
  return Promise.race([fp,tp]);
}
function tryXml(u,ms){return tf(u,ms).then(function(r){return r.text();}).then(function(t){
  if(!t||t.length<200)throw new Error('short');
  if(t.indexOf('<rss')<0&&t.indexOf('<feed')<0&&t.indexOf('<channel')<0)throw new Error('notrss');
  return{type:'xml',data:t};});}
function tryJson(u,ms){return tf(u,ms).then(function(r){return r.json();}).then(function(j){
  if(!j||j.status!=='ok'||!j.items||!j.items.length)throw new Error('bad');return{type:'json',data:j};});}
function raceAny(ps){return new Promise(function(res,rej){var n=ps.length,f=0;if(!n)return rej(new Error('empty'));ps.forEach(function(p){Promise.resolve(p).then(res).catch(function(){if(++f===n)rej(new Error('all failed'));});});});}

function fetchFeed(url){
  var enc=encodeURIComponent(url);
  var base='https://api.rss2json.com/v1/api.json?rss_url='+enc+'&count=20';
  return jsonp(base,14000).catch(function(){
    return raceAny([
      tryJson(base,14000),
      tryXml('https://corsproxy.io/?'+enc,14000),
      tryXml('https://api.allorigins.win/raw?url='+enc,14000),
      tryXml('https://api.codetabs.com/v1/proxy?quest='+enc,14000),
      tryXml(url,12000),
    ]);
  });
}

// ── Parse ─────────────────────────────────────────────────────────────
function strip(s){return(s||'').replace(/<!\[CDATA\[|\]\]>/g,'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/\s+/g,' ').trim();}
function fmtDate(s){if(!s)return'';try{var d=new Date(s);if(isNaN(d))return'';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return'';}}
function parseDur(s){if(!s)return 0;var p=s.trim().split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p.length===2?p[0]*60+p[1]:parseInt(s)||0;}
function fmtDurCompact(s){
  if(!s||!isFinite(s)||s<=0)return'';
  var h=Math.floor(s/3600),m=Math.round((s%3600)/60);
  if(h>=1)return h+'hr';
  return m+'m';
}
function fmtSecs(s){if(!s||!isFinite(s))return'--:--';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=Math.floor(s%60);return h?h+':'+('0'+m).slice(-2)+':'+('0'+x).slice(-2):('0'+m).slice(-2)+':'+('0'+x).slice(-2);}
function pubMs(s){if(!s)return 0;try{var d=new Date(s);return isNaN(d)?0:d.getTime();}catch(e){return 0;}}

function parseJsonFeed(j){
  return{
    artwork:j.feed&&j.feed.image?j.feed.image:'',
    episodes:j.items.slice(0,20).map(function(item,i){return{
      id:i,title:strip(item.title||'Untitled'),
      audio:item.enclosure&&item.enclosure.link?item.enclosure.link:'',
      date:fmtDate(item.pubDate),pubMs:pubMs(item.pubDate),
      durSecs:parseDur(item['itunes:duration']||item.duration||''),
    };}).filter(function(ep){return ep.audio;})
  };
}
function parseXmlFeed(text){
  var xml=new DOMParser().parseFromString(text,'text/xml');
  var NS='http://www.itunes.com/dtds/podcast-1.0.dtd';
  var ae=xml.getElementsByTagNameNS(NS,'image')[0];
  var artwork=ae?ae.getAttribute('href'):'';
  var fb=xml.querySelector('channel > image > url');if(!artwork&&fb)artwork=fb.textContent;
  var episodes=[].slice.call(xml.querySelectorAll('item')).slice(0,20).map(function(item,i){
    var enc=item.querySelector('enclosure');
    var de=item.getElementsByTagNameNS(NS,'duration')[0]||item.querySelector('duration');
    var desc=(item.querySelector('description')||{textContent:''}).textContent;
    var pd=(item.querySelector('pubDate')||{textContent:''}).textContent;
    return{id:i,title:strip((item.querySelector('title')||{textContent:'Untitled'}).textContent),
      audio:enc?enc.getAttribute('url'):'',date:fmtDate(pd),pubMs:pubMs(pd),
      desc:strip(desc).slice(0,180),durSecs:parseDur(de?de.textContent:'')};
  }).filter(function(ep){return ep.audio;});
  return{artwork:artwork,episodes:episodes};
}

// ── Color ─────────────────────────────────────────────────────────────
function extractColor(imgUrl){
  return new Promise(function(res){
    if(!imgUrl)return res(null);
    var done=setTimeout(function(){res(null);},8000);
    function attempt(src){
      var img=new Image();img.crossOrigin='anonymous';
      img.onload=function(){
        clearTimeout(done);
        try{
          var cv=document.createElement('canvas');cv.width=cv.height=24;
          var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,24,24);
          var d=ctx.getImageData(0,0,24,24).data,b={},best=null,bestN=0;
          for(var i=0;i<d.length;i+=4){
            var r=d[i],g=d[i+1],bl=d[i+2],a=d[i+3];
            if(a<150)continue;var lum=(r+g+bl)/3;if(lum>235||lum<15)continue;
            if(Math.max(r,g,bl)-Math.min(r,g,bl)<18)continue;
            var k=Math.round(r/22)*22+','+Math.round(g/22)*22+','+Math.round(bl/22)*22;
            b[k]=(b[k]||0)+1;if(b[k]>bestN){bestN=b[k];best=k;}
          }
          if(best){var p=best.split(',').map(Number);return res({r:p[0],g:p[1],b:p[2]});}
          var rr=0,gg=0,bb=0,n=0;
          for(var i=0;i<d.length;i+=4){var lum=(d[i]+d[i+1]+d[i+2])/3;if(d[i+3]>128&&lum>20&&lum<230){rr+=d[i];gg+=d[i+1];bb+=d[i+2];n++;}}
          res(n?{r:Math.round(rr/n),g:Math.round(gg/n),b:Math.round(bb/n)}:null);
        }catch(e){res(null);}
      };
      img.onerror=function(){res(null);};
      img.src=src;
    }
    var probe=new Image();probe.crossOrigin='anonymous';
    probe.onload=function(){attempt(imgUrl);};
    probe.onerror=function(){attempt('https://corsproxy.io/?'+encodeURIComponent(imgUrl));};
    probe.src=imgUrl;
  });
}

function applyTint(color){
  S.lastColor=color||null;
  var panel=document.getElementById('right-panel');
  var tint=document.getElementById('tint');
  var app=document.getElementById('app');
  if(app)app.style.background=C.bg;
  if(!panel)return;
  if(!color){panel.style.background=C.bg;if(tint)tint.style.background='transparent';return;}
  var f=dark?0.18:0.22,base=dark?{r:8,g:7,b:6}:{r:220,g:212,b:200};
  var cap=dark?38:235,fn=dark?Math.min:Math.max;
  var r=fn(Math.round(color.r*f+base.r*(1-f)),cap);
  var g=fn(Math.round(color.g*f+base.g*(1-f)),cap);
  var b=fn(Math.round(color.b*f+base.b*(1-f)),cap);
  panel.style.background='rgb('+r+','+g+','+b+')';
  var a=dark?0.2:0.12;
  if(tint)tint.style.background='radial-gradient(ellipse at 75% 110%, rgba('+color.r+','+color.g+','+color.b+','+a+') 0%, rgba('+color.r+','+color.g+','+color.b+',0.04) 50%, transparent 75%)';
  updateMeta();
}

var DEL_KEY='pod_deleted_v1';
var deletedSet=(function(){try{return new Set(JSON.parse(localStorage.getItem(DEL_KEY)||'[]'));}catch(e){return new Set();}})();
function delKey(showName,title){return showName+'||'+title;}
function markDeleted(showName,title){deletedSet.add(delKey(showName,title));try{localStorage.setItem(DEL_KEY,JSON.stringify(Array.from(deletedSet)));}catch(e){}}
function isDeleted(showName,title){return deletedSet.has(delKey(showName,title));}

var playedSet=(function(){try{return new Set(JSON.parse(localStorage.getItem('pod_played')||'[]'));}catch(e){return new Set();}})();
function pKey(showName,ep){return showName+'||'+ep.title;}
function isPlayed(showName,ep){return playedSet.has(pKey(showName,ep));}
function markPlayed(showName,ep){if(!ep)return;var k=pKey(showName,ep);if(!playedSet.has(k)){playedSet.add(k);try{localStorage.setItem('pod_played',JSON.stringify(Array.from(playedSet)));}catch(e){}rEpisodes();}}
function unmarkPlayed(showName,ep){var k=pKey(showName,ep);if(playedSet.has(k)){playedSet.delete(k);try{localStorage.setItem('pod_played',JSON.stringify(Array.from(playedSet)));}catch(e){}rEpisodes();}}

var S={show:null,episodes:[],episode:null,showName:'',artwork:'',loading:false,error:null,playing:false,elapsed:0,duration:0,volume:1,lastColor:null};
// Playback display state — only updates when a new episode starts, never when browsing
var P={episode:null,showName:'',artwork:''};
var VIEW='home';
var homeItems=[],homeLoading=false,homeLoaded=false;
var audio=document.getElementById('audio');

audio.addEventListener('timeupdate',function(){
  S.elapsed=audio.currentTime;S.duration=isFinite(audio.duration)?audio.duration:0;
  if(S.episode&&S.duration>0&&S.elapsed/S.duration>0.9)markPlayed(S.showName,S.episode);
  // Only update the countdown text — don't rebuild the whole player
  var t=document.getElementById('pcountdown');
  if(t){
    var ep=P.episode,elapsed=S.elapsed,dur=S.duration;
    t.textContent=ep&&dur?fmtSecs(dur-elapsed):ep&&ep.durSecs?fmtSecs(ep.durSecs):'';
  }
});
audio.addEventListener('durationchange',function(){
  S.duration=isFinite(audio.duration)?audio.duration:0;
  var t=document.getElementById('pcountdown');
  if(t&&P.episode)t.textContent=S.duration?fmtSecs(S.duration):P.episode.durSecs?fmtSecs(P.episode.durSecs):'';
});
audio.addEventListener('play',function(){S.playing=true;waResume();updateMeta();rPlayer();});
audio.addEventListener('pause',function(){S.playing=false;saveResume();updateMeta();rPlayer();});
audio.addEventListener('ended',function(){
  // Capture before any state changes
  var finishedEp=S.episode, finishedShow=S.showName;

  S.playing=false;
  if(finishedEp){markPlayed(finishedShow,finishedEp);posClear(finishedEp.audio);}
  try{localStorage.removeItem(RESUME_KEY);}catch(e){}
  updateMeta();rPlayer();

  if(!finishedEp)return;

  var nextEp=null, nextShow=null, nextArt='';

  // Search show episode list
  if(S.episodes.length){
    var idx=S.episodes.findIndex(function(x){return x.id===finishedEp.id;});
    if(idx>=0&&S.episodes[idx+1]){
      nextEp=S.episodes[idx+1];nextShow=finishedShow;nextArt=S.artwork;
    }
  }

  // Search home items (as fallback or if on home view)
  if(!nextEp&&homeItems.length){
    var hidx=homeItems.findIndex(function(x){return x.ep.id===finishedEp.id&&x.feedName===finishedShow;});
    if(hidx>=0&&homeItems[hidx+1]){
      var ni=homeItems[hidx+1];
      nextEp=ni.ep;nextShow=ni.feedName;nextArt=ni.artwork;
    }
  }

  if(nextEp&&nextShow){
    S.artwork=nextArt;
    setTimeout(function(){playEp(nextEp,nextShow);},400);
  }
});
audio.addEventListener('error',function(){S.error='Audio failed.';S.playing=false;rPlayer();});

// ── Episode download cache (Cache API + localStorage manifest) ────────
var DL_CACHE = 'pod_audio_v1';
var DL_META_KEY = 'pod_dl_meta_v1';
var DL_TTL = 3 * 24 * 60 * 60 * 1000; // 3 days

function dlMetaGet(){
  try{return JSON.parse(localStorage.getItem(DL_META_KEY)||'{}');}catch(e){return{};}
}
function dlMetaSave(meta){
  try{localStorage.setItem(DL_META_KEY,JSON.stringify(meta));}catch(e){}
}

// Returns a local cached URL for an episode, or null
async function dlGetLocal(audioUrl){
  try{
    var cache=await caches.open(DL_CACHE);
    var resp=await cache.match(audioUrl);
    return resp?audioUrl:null;
  }catch(e){return null;}
}

// Download one episode into Cache API
async function dlEpisode(audioUrl,feedName,title){
  if(!audioUrl)return;
  try{
    var cache=await caches.open(DL_CACHE);
    var existing=await cache.match(audioUrl);
    if(existing)return; // already downloaded
    console.log('[dl] downloading:',title);
    var resp=await fetch(audioUrl);
    if(!resp.ok)throw new Error('fetch failed');
    await cache.put(audioUrl,resp.clone());
    // Record in manifest
    var meta=dlMetaGet();
    meta[audioUrl]={feedName:feedName,title:title,ts:Date.now()};
    dlMetaSave(meta);
    console.log('[dl] saved:',title);
  }catch(e){
    console.warn('[dl] failed:',title,e.message);
  }
}

// Delete episodes older than 3 days
async function dlPurgeOld(){
  try{
    var meta=dlMetaGet();
    var now=Date.now();
    var cache=await caches.open(DL_CACHE);
    var toDelete=Object.keys(meta).filter(function(url){return now-meta[url].ts>DL_TTL;});
    await Promise.all(toDelete.map(function(url){
      delete meta[url];
      return cache.delete(url).catch(function(){});
    }));
    if(toDelete.length){
      dlMetaSave(meta);
      console.log('[dl] purged',toDelete.length,'expired episodes');
    }
  }catch(e){}
}

// Download new episodes found during a refresh
function dlQueueNew(newItems){
  if(!newItems||!newItems.length)return;
  if(!('caches' in window)){console.warn('[dl] Cache API not available');return;}
  // Queue downloads with a small delay between each to avoid hammering
  newItems.forEach(function(item,i){
    setTimeout(function(){
      dlEpisode(item.ep.audio,item.feedName,item.ep.title);
    },i*1500);
  });
}

// ── Background refresh ────────────────────────────────────────────────
var REFRESH_MS = 60 * 60 * 1000; // 1 hour
var lastRefresh = 0;
var refreshTimer = null;
var refreshDot = null; // tracks pulse indicator state

function refreshFeeds(silent){
  // Don't overlap with initial load
  if(homeLoading)return;
  lastRefresh = Date.now();
  showRefreshDot('loading');

  var tasks=FEEDS.map(function(feed){
    return fetchFeed(feed.url).then(function(res){
      var p=res.type==='json'?parseJsonFeed(res.data):parseXmlFeed(res.data);
      return p.episodes.slice(0,3).map(function(ep){return{feedName:feed.name,ep:ep,artwork:p.artwork};});
    }).catch(function(){return[];});
  });

  Promise.all(tasks).then(function(results){
    var all=[];results.forEach(function(r){r.forEach(function(x){all.push(x);});});
    all.sort(function(a,b){return(b.ep.pubMs||0)-(a.ep.pubMs||0);});

    // Check if there are genuinely new episodes
    var oldTitles=new Set(homeItems.map(function(x){return x.feedName+'|'+x.ep.title;}));
    var newItems=all.filter(function(x){return!oldTitles.has(x.feedName+'|'+x.ep.title);});
    var hasNew=newItems.length>0;

    homeItems=all;homeLoaded=true;
    showRefreshDot(hasNew?'new':'done');
    if(VIEW==='home')rMain();
    if(hasNew){updateTabTitle(true);dlQueueNew(newItems);}
    setTimeout(function(){showRefreshDot(null);},3000);
  }).catch(function(){
    showRefreshDot(null);
  });
}

function showRefreshDot(state){
  var el=document.getElementById('refresh-indicator');
  if(!el)return;
  if(!state){el.style.opacity='0';return;}
  el.style.opacity='1';
  if(state==='loading'){el.style.background='#4E4A46';el.style.animation='breathe 1s infinite';}
  else if(state==='new'){el.style.background='#D4430C';el.style.animation='none';}
  else{el.style.background='#3A6A3A';el.style.animation='none';}
}

// ── Feed cache (localStorage) ─────────────────────────────────────────
var CACHE_KEY_HOME = 'pod_home_v1';
var CACHE_KEY_SHOW = 'pod_show_v1_';
var CACHE_TTL = 60 * 60 * 1000; // 1 hour — refresh if older than this

function cacheGet(key){
  try{
    var raw=localStorage.getItem(key);
    if(!raw)return null;
    var obj=JSON.parse(raw);
    if(!obj||!obj.ts||!obj.data)return null;
    return obj;
  }catch(e){return null;}
}
function cacheSet(key,data){
  try{localStorage.setItem(key,JSON.stringify({ts:Date.now(),data:data}));}catch(e){}
}
function cacheAge(key){
  var obj=cacheGet(key);
  if(!obj)return Infinity;
  return Date.now()-obj.ts;
}


function startRefreshTimer(){
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(function(){refreshFeeds(true);},REFRESH_MS);
}

function fetchAllFeeds(callback){
  var tasks=FEEDS.map(function(feed){
    return fetchFeed(feed.url).then(function(res){
      var p=res.type==='json'?parseJsonFeed(res.data):parseXmlFeed(res.data);
      cacheSet(CACHE_KEY_SHOW+feed.name,{episodes:p.episodes,artwork:p.artwork});
      return filterDeleted(p.episodes,feed.name).slice(0,3).map(function(ep){return{feedName:feed.name,ep:ep,artwork:p.artwork};});
    }).catch(function(){return[];});
  });
  Promise.all(tasks).then(function(results){
    var all=[];results.forEach(function(r){r.forEach(function(x){all.push(x);});});
    all.sort(function(a,b){return(b.ep.pubMs||0)-(a.ep.pubMs||0);});
    cacheSet(CACHE_KEY_HOME,all);
    callback(all);
  });
}

function loadHome(){
  VIEW='home';applyTint(null);render();
  if(homeLoaded)return;
  var cached=cacheGet(CACHE_KEY_HOME);
  var age=cacheAge(CACHE_KEY_HOME);
  if(cached&&cached.data&&cached.data.length){
    homeItems=filterDeletedHome(cached.data);homeLoaded=true;homeLoading=false;
    rMain();
    if(age>CACHE_TTL){
      showRefreshDot('loading');
      fetchAllFeeds(function(all){
        var oldTitles=new Set(homeItems.map(function(x){return x.feedName+'|'+x.ep.title;}));
        var hasNew=all.some(function(x){return!oldTitles.has(x.feedName+'|'+x.ep.title);});
        homeItems=all;
        showRefreshDot(hasNew?'new':'done');
        if(VIEW==='home')rMain();
        if(hasNew)updateTabTitle(true);
        setTimeout(function(){showRefreshDot(null);},3000);
      });
    }
    startRefreshTimer();
  }else{
    homeLoading=true;rMain();
    fetchAllFeeds(function(all){
      homeItems=filterDeletedHome(all);homeLoading=false;homeLoaded=true;
      if(VIEW==='home')rMain();
      startRefreshTimer();
    });
  }
}

async function loadFeed(show){
  VIEW='show';
  S=Object.assign({},S,{show:show,episodes:[],loading:true,error:null});
  applyTint(null);render();

  // Load from cache instantly if fresh enough
  var cached=cacheGet(CACHE_KEY_SHOW+show.name);
  var age=cacheAge(CACHE_KEY_SHOW+show.name);
  if(cached&&cached.data&&cached.data.episodes&&cached.data.episodes.length){
    S.episodes=filterDeleted(cached.data.episodes,show.name);S.artwork=cached.data.artwork||'';S.loading=false;
    if(cached.data.artwork)extractColor(cached.data.artwork).then(applyTint);
    rSidebar();rMain();
    // Silently refresh in background if stale
    if(age>CACHE_TTL){
      fetchFeed(show.url).then(function(res){
        var p=res.type==='json'?parseJsonFeed(res.data):parseXmlFeed(res.data);
        var filtered=filterDeleted(p.episodes,show.name);
        cacheSet(CACHE_KEY_SHOW+show.name,{episodes:filtered,artwork:p.artwork});
        if(VIEW==='show'&&S.show&&S.show.name===show.name){
          S.episodes=filtered;S.artwork=p.artwork;
          if(p.artwork)extractColor(p.artwork).then(applyTint);
          rMain();
        }
      }).catch(function(){});
    }
    return;
  }

  // No cache — fetch fresh
  try{
    var res=await fetchFeed(show.url);
    var p=res.type==='json'?parseJsonFeed(res.data):parseXmlFeed(res.data);
    S.episodes=filterDeleted(p.episodes,show.name);S.artwork=p.artwork;S.loading=false;
    cacheSet(CACHE_KEY_SHOW+show.name,{episodes:S.episodes,artwork:p.artwork});
    if(!p.episodes.length)S.error='No playable audio found.';
    if(p.artwork)extractColor(p.artwork).then(applyTint);
  }catch(e){
    S.loading=false;
    S.error=window.location.protocol==='file:'?'Open from a web server — Safari blocks local file requests.':'Could not load feed. Check connection and retry.';
  }
  rSidebar();rMain();
}

function playEp(ep,showName){
  if(S.episode&&S.episode.id===ep.id&&S.showName===showName){
    audio.paused?audio.play().catch(function(){}):audio.pause();return;
  }
  playClick();
  // Save position of episode we're leaving
  if(S.episode&&audio.currentTime>2)posSave(S.episode.audio,audio.currentTime);

  S.episode=ep;S.showName=showName||'';S.elapsed=0;S.duration=0;S.error=null;
  P.episode=ep;P.showName=showName||'';P.artwork=S.artwork;

  var savedPos=posFor(ep.audio);
  audio.src=ep.audio;audio.load();

  if(savedPos>0){
    // Seek to saved position once metadata is ready, then play
    audio.addEventListener('loadedmetadata',function onMeta(){
      audio.removeEventListener('loadedmetadata',onMeta);
      audio.currentTime=savedPos;
      audio.play().catch(function(){S.error='Click ▶ to start.';rPlayer();});
    });
  }else{
    audio.play().catch(function(){S.error='Click ▶ to start.';rPlayer();});
  }

  if('caches' in window)dlEpisode(ep.audio,showName||'',ep.title);
  if(casting)castMedia(ep.audio,ep.title,S.artwork,savedPos||0);
  updateMeta();rMain();rPlayer();
}
function playClick(){
  try{
    var ctx=WA.ctx||(WA.ctx=new(window.AudioContext||window.webkitAudioContext)());
    if(ctx.state==='suspended')ctx.resume();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(1200,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.04);
    gain.gain.setValueAtTime(0.08,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.06);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.06);
  }catch(e){}
}

function togglePlay(){if(!S.episode)return;playClick();audio.paused?audio.play().catch(function(){}):audio.pause();}
function skip(s){if(!S.episode)return;audio.currentTime=Math.max(0,Math.min(isFinite(audio.duration)?audio.duration:0,audio.currentTime+s));}
function seek(e){
  if(!S.episode||!isFinite(audio.duration)||!audio.duration)return;
  var rect=e.currentTarget.getBoundingClientRect();
  audio.currentTime=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width))*audio.duration;
}

// ── Web Audio waveform ────────────────────────────────────────────────
var WA={ctx:null,analyser:null,source:null,rafId:null,bars:null,playing:false};

function waInit(){
  if(WA.ctx)return;
  try{
    WA.ctx=new(window.AudioContext||window.webkitAudioContext)();
    WA.analyser=WA.ctx.createAnalyser();
    WA.analyser.fftSize=128;
    WA.analyser.smoothingTimeConstant=0.8;
    WA.source=WA.ctx.createMediaElementSource(audio);
    WA.source.connect(WA.analyser);
    WA.analyser.connect(WA.ctx.destination);
  }catch(e){WA.ctx=null;}
}

function waResume(){
  if(WA.ctx&&WA.ctx.state==='suspended')WA.ctx.resume();
}

function waDraw(){
  var cv=document.getElementById('waveform-cv');
  if(!cv)return;
  var W=cv.width,H=cv.height;
  var ctx=cv.getContext('2d');

  var data=new Uint8Array(WA.analyser?WA.analyser.frequencyBinCount:64);
  if(WA.analyser)WA.analyser.getByteFrequencyData(data);

  var numBars=48,barW=Math.floor(W/numBars)-1,gap=1;
  if(!WA.bars||WA.bars.length!==numBars){
    WA.bars=new Array(numBars).fill(0);
  }

  // compute target heights from frequency data
  var binPerBar=Math.floor(data.length/numBars);
  var isPlaying=S.playing&&WA.ctx;

  ctx.clearRect(0,0,W,H);

  for(var i=0;i<numBars;i++){
    var sum=0;
    if(isPlaying){
      for(var j=0;j<binPerBar;j++)sum+=data[i*binPerBar+j];
      sum/=binPerBar;
    }
    var target=isPlaying?(sum/255)*(H*0.85):0;
    // ease toward target
    WA.bars[i]+=(target-WA.bars[i])*(isPlaying?0.25:0.1);
    if(WA.bars[i]<0.5)WA.bars[i]=0;

    var bh=Math.max(WA.bars[i],isPlaying?1.5:1);
    var x=i*(barW+gap);
    var y=(H-bh)/2;

    // color: orange accent for playing, muted for paused
    var alpha=isPlaying?0.85:0.3;
    ctx.fillStyle='rgba(212,67,12,'+alpha+')';
    ctx.fillRect(x,y,barW,bh);
  }

  // playhead dot only
  var ep=P.episode,elapsed=S.elapsed,dur=S.duration;
  if(ep){
    var prog=dur>0?elapsed/dur:0;
    var px=Math.round(prog*W);
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(px,H/2,4.4,0,Math.PI*2);ctx.fill();
  }

  WA.rafId=requestAnimationFrame(waDraw);
}

function waStart(){
  waInit();waResume();
  if(!WA.rafId)waDraw();
}

function waStop(){
  // keep animating so bars can ease to flat
}

// ── Meta title + favicon ──────────────────────────────────────────────
function updateMeta(){
  var ep=S.episode,sn=S.showName;
  document.title=ep?(ep.title+' — '+sn):'Podcast';
  // favicon: 32×32 canvas filled with artwork color
  try{
    var cv=document.createElement('canvas');cv.width=cv.height=32;
    var ctx=cv.getContext('2d');
    var color=S.lastColor;
    if(color){
      // use the crushed bg color like applyTint does
      var f=dark?0.18:0.22,base=dark?{r:8,g:7,b:6}:{r:220,g:212,b:200};
      var cap=dark?38:235,fn=dark?Math.min:Math.max;
      var r=fn(Math.round(color.r*f+base.r*(1-f)),cap);
      var g=fn(Math.round(color.g*f+base.g*(1-f)),cap);
      var b=fn(Math.round(color.b*f+base.b*(1-f)),cap);
      ctx.fillStyle='rgb('+r+','+g+','+b+')';
    }else{
      ctx.fillStyle=C.bg;
    }
    // rounded rect — fillRect fallback for older Safari
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(0,0,32,32,6);ctx.fill();}
    else{ctx.fillRect(0,0,32,32);}
    // draw a small orange dot in the center when playing
    if(S.playing){
      ctx.fillStyle=C.ac;
      ctx.beginPath();ctx.arc(16,16,7,0,Math.PI*2);ctx.fill();
    }else{
      // draw a subtle triangle (play icon) when paused
      ctx.fillStyle=S.lastColor?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.2)';
      ctx.beginPath();ctx.moveTo(12,10);ctx.lineTo(24,16);ctx.lineTo(12,22);ctx.closePath();ctx.fill();
    }
    var link=document.querySelector('link[rel="icon"]')||document.createElement('link');
    link.rel='icon';link.type='image/png';link.href=cv.toDataURL('image/png');
    if(!link.parentNode)document.head.appendChild(link);
  }catch(e){}
}


// ── Per-episode position store ────────────────────────────────────────
// Saves position for every episode ever played, keyed by audio URL.
// On relaunch restores the last-playing episode. When any episode is
// tapped again it seeks to where you left off.
var POS_KEY = 'pod_positions_v1';
var RESUME_KEY = 'pod_resume_v1'; // which episode was last active

function posGet(){
  try{return JSON.parse(localStorage.getItem(POS_KEY)||'{}');}catch(e){return{};}
}
function posSave(audioUrl, elapsed){
  if(!audioUrl||elapsed<2)return; // don't save if barely started
  try{
    var all=posGet();
    all[audioUrl]={elapsed:Math.floor(elapsed),ts:Date.now()};
    localStorage.setItem(POS_KEY,JSON.stringify(all));
  }catch(e){}
}
function posFor(audioUrl){
  try{var all=posGet();return all[audioUrl]?all[audioUrl].elapsed:0;}catch(e){return 0;}
}
function posClear(audioUrl){
  try{var all=posGet();delete all[audioUrl];localStorage.setItem(POS_KEY,JSON.stringify(all));}catch(e){}
}

function saveResume(){
  if(!S.episode)return;
  var t=Math.floor(audio.currentTime);
  posSave(S.episode.audio, t);
  try{
    localStorage.setItem(RESUME_KEY,JSON.stringify({
      showName:S.showName, title:S.episode.title,
      audio:S.episode.audio, artwork:P.artwork,
      elapsed:t, durSecs:S.episode.durSecs||0,
      date:S.episode.date||'', id:S.episode.id,
    }));
  }catch(e){}
}

function restoreResume(){
  try{
    var raw=localStorage.getItem(RESUME_KEY);
    if(!raw)return;
    var r=JSON.parse(raw);
    if(!r||!r.audio||!r.title)return;
    var saved=posFor(r.audio)||r.elapsed||0;
    var ep={id:r.id||0,title:r.title,audio:r.audio,date:r.date||'',durSecs:r.durSecs||0};
    S.episode=ep;S.showName=r.showName||'';S.artwork=r.artwork||'';S.elapsed=saved;
    P.episode=ep;P.showName=r.showName||'';P.artwork=r.artwork||'';
    audio.src=r.audio;audio.load();
    audio.addEventListener('loadedmetadata',function onMeta(){
      audio.removeEventListener('loadedmetadata',onMeta);
      if(saved>0)audio.currentTime=saved;
    });
    if(r.artwork)extractColor(r.artwork).then(applyTint);
    updateMeta();rPlayer();
    console.log('[pod] resumed:',r.title,'@',fmtSecs(saved));
  }catch(e){}
}

// Save position every 5s while playing and on pause

var castAvailable = false;

window['__onGCastApiAvailable'] = function(isAvailable) {

    cast.framework.CastContext.getInstance().setOptions({
      receiverApplicationId: 'CC1AD845',
      autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
    });

    castController.addEventListener(

      }
    );

        castAvailable = state !== cast.framework.CastState.NO_DEVICES_AVAILABLE;
        updateCastBtn();
      }
    );

};

function castMedia(url, title, artwork, startTime) {
  if (!casting) return;
  try {
    var session = cast.framework.CastContext.getInstance().getCurrentSession();
    if (!session) return;
    var mediaInfo = new chrome.cast.media.MediaInfo(url, 'audio/mpeg');
    mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
    mediaInfo.metadata.title = title || '';
    if (artwork) mediaInfo.metadata.images = [new chrome.cast.Image(artwork)];
    var request = new chrome.cast.media.LoadRequest(mediaInfo);
    request.currentTime = startTime || 0;
    session.loadMedia(request).then(function() {
      console.log('[cast] media loaded');
    }).catch(function(e) { console.warn('[cast] load error:', e); });
  } catch(e) { console.warn('[cast] castMedia error:', e); }
}

function startCast() {
  if (!castAvailable) return;
  try {
    cast.framework.CastContext.getInstance().requestSession().then(function() {
      if (S.episode) castMedia(S.episode.audio, S.episode.title, P.artwork, audio.currentTime);
    }).catch(function() {});
  } catch(e) {}
}

function updateCastBtn() {
  var btn = document.getElementById('cast-btn');
  if (!btn) return;
  if (castAvailable || casting) btn.classList.add('available'); else btn.classList.remove('available');

  // Update icon color
  var svg = btn.querySelector('svg');
  if (svg) svg.style.color = casting ? '#D4430C' : '#4E4A46';
}

// Persistent delegated listeners on player — survive rPlayer() re-renders
function pixelDissolve(rowEl, onDone){
  if(!rowEl)return onDone&&onDone();
  var rect=rowEl.getBoundingClientRect();
  var appRect=document.getElementById('app').getBoundingClientRect();
  var W=Math.round(rect.width),H=Math.round(rect.height);
  if(!W||!H)return onDone&&onDone();

  // Snapshot the row into a canvas overlay
  var cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  cv.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+W+'px;height:'+H+'px;pointer-events:none;z-index:9999;image-rendering:pixelated;image-rendering:crisp-edges;';
  document.body.appendChild(cv);
  var ctx=cv.getContext('2d');

  // Fill with current row background color
  ctx.fillStyle=dark?'rgba(232,226,216,0.08)':'rgba(26,23,20,0.06)';
  ctx.fillRect(0,0,W,H);

  // Draw the row text as a simple colored rectangle to represent it
  ctx.fillStyle=dark?'rgba(232,226,216,0.55)':'rgba(26,23,20,0.4)';
  ctx.fillRect(20,H/2-6,W*0.6,10);
  ctx.fillRect(W-80,H/2-4,50,7);

  var frames=0,maxFrames=120;
  var tmp=document.createElement('canvas');
  var px=1;

  // Hide the real row immediately
  rowEl.style.opacity='0';

  function step(){
    frames++;
    px=Math.min(Math.ceil(frames*0.28),W);
    var cols=Math.max(1,Math.ceil(W/px));
    var rows=Math.max(1,Math.ceil(H/px));
    tmp.width=cols;tmp.height=rows;
    var tc=tmp.getContext('2d');
    tc.imageSmoothingEnabled=false;
    tc.drawImage(cv,0,0,cols,rows);
    ctx.clearRect(0,0,W,H);
    ctx.imageSmoothingEnabled=false;
    var alpha=1-(frames/maxFrames)*0.7;
    ctx.globalAlpha=Math.max(0,alpha);
    ctx.drawImage(tmp,0,0,W,H);
    if(frames<maxFrames){
      requestAnimationFrame(step);
    }else{
      cv.parentNode&&cv.parentNode.removeChild(cv);
      onDone&&onDone();
    }
  }
  requestAnimationFrame(step);
}


document.getElementById('app').addEventListener('click',function(e){
  var btn=e.target.closest('#ppl');if(btn)togglePlay();
});

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowLeft'){e.preventDefault();skip(-15);}
  if(e.code==='ArrowRight'){e.preventDefault();skip(15);}
  if(e.code==='ArrowUp'){
    e.preventDefault();
    S.volume=Math.min(1,Math.round((S.volume+0.1)*10)/10);
    audio.volume=S.volume;audio.muted=false;
  }
  if(e.code==='ArrowDown'){
    e.preventDefault();
    S.volume=Math.max(0,Math.round((S.volume-0.1)*10)/10);
    audio.volume=S.volume;
  }
  if(e.code==='KeyM'){
    e.preventDefault();
    audio.muted=!audio.muted;
  }
  if(e.code==='Delete'||e.code==='Backspace'){
    e.preventDefault();
    var activeEp=S.episode;
    if(!activeEp)return;

    // Find the row in whichever view is active
    var rowEl=document.querySelector('.sep[data-ep="'+activeEp.id+'"]')
           ||document.querySelector('.hep[data-hi]');

    // For home view, find the row matching the active episode
    if(!rowEl&&VIEW==='home'){
      var rows=document.querySelectorAll('.hep');
      for(var i=0;i<rows.length;i++){
        var item=homeItems[+rows[i].dataset.hi];
        if(item&&item.ep&&item.ep.id===activeEp.id&&item.feedName===S.showName){
          rowEl=rows[i];break;
        }
      }
    }

    playClick();
    // Persist the deletion immediately
    markDeleted(S.showName, activeEp.title);
    pixelDissolve(rowEl,function(){
      // Find next episode BEFORE removing
      var nextEp=null, nextShowName=null;
      if(VIEW==='show'){
        var idx=S.episodes.findIndex(function(x){return x.id===activeEp.id;});
        var nextInShow=S.episodes[idx+1]||S.episodes[idx-1]||null;
        if(nextInShow){nextEp=nextInShow;nextShowName=S.showName;}
        S.episodes=S.episodes.filter(function(x){return x.id!==activeEp.id;});
      }else if(VIEW==='home'){
        var hidx=homeItems.findIndex(function(x){return x.ep.id===activeEp.id&&x.feedName===S.showName;});
        var nextItem=homeItems[hidx+1]||homeItems[hidx-1]||null;
        if(nextItem){nextEp=nextItem.ep;nextShowName=nextItem.feedName;S.artwork=nextItem.artwork;if(nextItem.artwork)extractColor(nextItem.artwork).then(applyTint);}
        homeItems=homeItems.filter(function(x){
          return!(x.ep.id===activeEp.id&&x.feedName===S.showName);
        });
      }
      // Clear current episode state
      audio.pause();audio.src='';
      S.episode=null;S.showName='';S.elapsed=0;S.duration=0;S.playing=false;
      P.episode=null;P.showName='';P.artwork='';
      try{localStorage.removeItem(RESUME_KEY);}catch(err){}
      updateMeta();rMain();rPlayer();
      // Auto-play next
      if(nextEp&&nextShowName){
        setTimeout(function(){playEp(nextEp,nextShowName);},50);
      }
    });
    return;
  }
  if(e.code==='KeyN'){
    e.preventDefault();
    var curEp=S.episode,curShow=S.showName;
    if(!curEp)return;
    var nextEp=null,nextShow=null;
    if(VIEW==='show'&&S.episodes.length){
      var idx=S.episodes.findIndex(function(x){return x.id===curEp.id;});
      var next=S.episodes[idx+1];
      if(next){nextEp=next;nextShow=curShow;}
    }else if(VIEW==='home'&&homeItems.length){
      var hidx=homeItems.findIndex(function(x){return x.ep.id===curEp.id&&x.feedName===curShow;});
      var nextItem=homeItems[hidx+1];
      if(nextItem){nextEp=nextItem.ep;nextShow=nextItem.feedName;S.artwork=nextItem.artwork;P.artwork=nextItem.artwork;if(nextItem.artwork)extractColor(nextItem.artwork).then(applyTint);}
    }
    if(nextEp&&nextShow){playClick();playEp(nextEp,nextShow);}
  }
  if(e.code==='KeyP'){
    e.preventDefault();
    var curEp=S.episode,curShow=S.showName;
    if(!curEp)return;
    var prevEp=null,prevShow=null;
    if(VIEW==='show'&&S.episodes.length){
      var idx=S.episodes.findIndex(function(x){return x.id===curEp.id;});
      var prev=S.episodes[idx-1];
      if(prev){prevEp=prev;prevShow=curShow;}
    }else if(VIEW==='home'&&homeItems.length){
      var hidx=homeItems.findIndex(function(x){return x.ep.id===curEp.id&&x.feedName===curShow;});
      var prevItem=homeItems[hidx-1];
      if(prevItem){prevEp=prevItem.ep;prevShow=prevItem.feedName;S.artwork=prevItem.artwork;P.artwork=prevItem.artwork;if(prevItem.artwork)extractColor(prevItem.artwork).then(applyTint);}
    }
    if(prevEp&&prevShow){playClick();playEp(prevEp,prevShow);}
  }
  if(e.code==='KeyL'){e.preventDefault();if(!dark)return;dark=false;setTheme();var panel=document.getElementById('right-panel');if(panel&&!S.lastColor)panel.style.background=C.bg;if(S.lastColor)applyTint(S.lastColor);render();}
  if(e.code==='KeyD'){e.preventDefault();if(dark)return;dark=true;setTheme();var panel=document.getElementById('right-panel');if(panel&&!S.lastColor)panel.style.background=C.bg;if(S.lastColor)applyTint(S.lastColor);render();}
  if(e.code==='KeyF'){
    e.preventDefault();
    if(!document.fullscreenElement&&!document.webkitFullscreenElement){
      var el=document.documentElement;
      (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    }
  }
  if(e.code==='Escape'){
    if(document.fullscreenElement||document.webkitFullscreenElement){
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    }
  }
});
